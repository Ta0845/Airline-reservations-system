<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airline Reservation System</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: linear-gradient(135deg, #eff6ff, #f8fafc); color: #0f172a; }
      .container { max-width: 980px; margin: 0 auto; padding: 2rem; }
      .hero { background: white; padding: 1.8rem; border-radius: 16px; box-shadow: 0 12px 36px rgba(15,23,42,0.08); margin-bottom: 1rem; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      .panel { background: white; padding: 1.2rem; border-radius: 16px; box-shadow: 0 10px 28px rgba(15,23,42,0.07); }
      input, button { width: 100%; padding: 0.75rem; border-radius: 10px; border: 1px solid #cbd5e1; margin: 0.4rem 0; box-sizing: border-box; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; }
      pre { background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: 10px; overflow: auto; }
      h1, h2, h3 { margin-top: 0; }
      @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <h1>✈️ Airline Reservation System</h1>
        <p>Register, log in, search flights, and create bookings from one simple interface.</p>
      </div>

      <div class="grid">
        <div class="panel">
          <h3>Authentication</h3>
          <input id="username" placeholder="Username" />
          <input id="password" type="password" placeholder="Password" />
          <button onclick="registerUser()">Register</button>
          <button onclick="loginUser()">Login</button>
        </div>

        <div class="panel">
          <h3>Search Flights</h3>
          <input id="origin" placeholder="Origin" />
          <input id="destination" placeholder="Destination" />
          <input id="departureDate" placeholder="Departure date (YYYY-MM-DD)" />
          <button onclick="searchFlights()">Search</button>
        </div>
      </div>

      <div class="grid" style="margin-top: 1rem;">
        <div class="panel">
          <h3>Create Booking</h3>
          <input id="flightId" placeholder="Flight ID" />
          <input id="seatNumber" placeholder="Seat Number" />
          <input id="firstName" placeholder="First Name" />
          <input id="lastName" placeholder="Last Name" />
          <button onclick="createBooking()">Create Booking</button>
        </div>

        <div class="panel">
          <h3>Response</h3>
          <pre id="output">Ready.</pre>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
